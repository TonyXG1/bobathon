version: '3.8'

services:
  # PostgreSQL Database (optional, can use SQLite instead)
  postgres:
    image: postgres:16-alpine
    container_name: regulatory-radar-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-regulatory_radar}
      POSTGRES_USER: ${POSTGRES_USER:-radar_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radar_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Extraction Service (Part 1)
  extraction-service:
    build:
      context: ./extraction_service
      dockerfile: Dockerfile
    container_name: extraction-service
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-radar_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-regulatory_radar}
      - CELLAR_SPARQL_ENDPOINT=${CELLAR_SPARQL_ENDPOINT}
      - CELLAR_REST_BASE_URL=${CELLAR_REST_BASE_URL}
      - ECHA_API_BASE_URL=${ECHA_API_BASE_URL}
      - ECHA_CANDIDATE_LIST_URL=${ECHA_CANDIDATE_LIST_URL}
      - CELLAR_MAX_CONCURRENT=${CELLAR_MAX_CONCURRENT:-5}
      - ECHA_CACHE_TTL=${ECHA_CACHE_TTL:-86400}
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-30}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8081

  # Assessment Service (Part 2)
  assessment-service:
    build:
      context: ./assessment_service
      dockerfile: Dockerfile
    container_name: assessment-service
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-radar_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-regulatory_radar}
      - EXTRACTION_SERVICE_URL=http://extraction-service:8081
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./dataset:/app/dataset:ro
    depends_on:
      postgres:
        condition: service_healthy
      extraction-service:
        condition: service_started
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8082

  # Alerting Service (Part 3)
  alerting-service:
    build:
      context: ./alerting_service
      dockerfile: Dockerfile
    container_name: alerting-service
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-radar_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-regulatory_radar}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - TWILIO_TEST_NUMBER=${TWILIO_TEST_NUMBER}
      - TWILIO_TEST_EMAIL=${TWILIO_TEST_EMAIL}
      - ASSESSMENT_SERVICE_URL=http://assessment-service:8082
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      assessment-service:
        condition: service_started
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8083

  # Orchestrator (Optional)
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    environment:
      - EXTRACTION_SERVICE_URL=http://extraction-service:8081
      - ASSESSMENT_SERVICE_URL=http://assessment-service:8082
      - ALERTING_SERVICE_URL=http://alerting-service:8083
      - EXTRACTION_SCHEDULE=${EXTRACTION_SCHEDULE:-0 */6 * * *}
      - ASSESSMENT_SCHEDULE=${ASSESSMENT_SCHEDULE:-30 */6 * * *}
      - AUTO_ALERT=${AUTO_ALERT:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - extraction-service
      - assessment-service
      - alerting-service
    restart: unless-stopped
    command: python run.py

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: regulatory-radar-network
